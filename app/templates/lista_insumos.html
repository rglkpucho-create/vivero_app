{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-primary mb-0"><i class="bi bi-grid-fill me-2"></i>Inventario</h2>
            <p class="text-muted mb-0 small">Gestiona tus productos, insumos y mercancía.</p>
        </div>
        <a href="{{ url_for('main.nuevo_insumo') }}" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
            <i class="bi bi-plus-lg me-2"></i>Nuevo
        </a>
    </div>

    <!-- Barra de Búsqueda y Filtros -->
    <div class="card border-0 shadow-sm mb-4 rounded-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-center">

                <!-- Buscador de Texto -->
                <div class="col-lg-5">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-end-0 text-muted ps-3"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 fs-6" placeholder="Buscar por nombre, código..." autocomplete="off">
                    </div>
                </div>

                <!-- Selector de Filtros de Stock -->
                <div class="col-lg-4">
                    <select class="form-select form-select-lg border-0 bg-light fw-bold text-secondary" id="filtroStock" onchange="filtrarProductos()">
                        <option value="todos" selected>📦 Ver Todo el Inventario</option>
                        <option value="con_stock">✅ Solo Disponibles</option>
                        <option value="alerta_total">⚠️ Todo lo Bajo/Agotado</option>
                        <hr>
                        <option value="bajo" class="text-warning">🔸 Solo Stock Bajo</option>
                        <option value="sin_stock" class="text-danger">🔴 Solo Agotados (0)</option>
                    </select>
                </div>

                <!-- Indicador de Carga -->
                <div class="col-lg-3 text-end">
                    <div id="loadingIndicator" class="text-primary small fw-bold" style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1"></span> Actualizando...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cuadrícula de Productos (Grid) -->
    <div class="row g-4" id="contenedorInsumos">
        {% include 'parciales/items_insumos.html' %}
    </div>
</div>

<script>
    let timeoutId;
    const searchInput = document.getElementById('searchInput');
    const filtroStock = document.getElementById('filtroStock');
    const contenedorInsumos = document.getElementById('contenedorInsumos');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function filtrarProductos() {
        loadingIndicator.style.display = 'inline-block';
        const query = searchInput.value;
        const filtro = filtroStock.value;

        fetch(`{{ url_for('main.lista_insumos') }}?q=${query}&filtro=${filtro}&ajax=1`)
            .then(response => response.text())
            .then(html => {
                contenedorInsumos.innerHTML = html;
                loadingIndicator.style.display = 'none';
            })
            .catch(err => {
                console.error('Error al filtrar:', err);
                loadingIndicator.style.display = 'none';
            });
    }

    searchInput.addEventListener('input', function() {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(filtrarProductos, 300);
    });
</script>

<style>
    .hover-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important;
        }

    .fade-in-item {
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
