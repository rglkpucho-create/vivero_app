{% extends "base.html" %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
    /* Ocultar el radio button nativo */
    .peer:checked + label {
        border-color: currentColor;
        background-color: #f0fdf4; /* Verde claro suave */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transform: translateY(-2px);
    }

    /* Estilo específico cuando se selecciona "Producción Fruto" (Cultivo) */
    #propProd:checked + label {
        background-color: #fffbeb; /* Amarillo claro suave */
        border-color: #d97706; /* Color ámbar */
        color: #d97706;
    }

    /* Estilo específico cuando se selecciona "Venta Plántula" (Vivero) */
    #propVenta:checked + label {
        border-color: #16a34a; /* Verde */
        color: #16a34a;
    }
</style>

<div class="max-w-4xl mx-auto py-8 px-4 font-sans text-slate-800">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">

        <div class="bg-gradient-to-br from-green-600 to-emerald-700 p-6 text-white">
            <div class="flex items-center gap-4">
                <div class="bg-white/20 rounded-full p-3 backdrop-blur-sm">
                    <i data-lucide="sprout" class="w-8 h-8 text-white"></i>
                </div>
                <div>
                    <h4 class="text-2xl font-bold">Iniciar Nueva Siembra</h4>
                    <p class="text-green-100 text-sm">Registra un nuevo lote de producción en una sede.</p>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form method="POST" class="space-y-8">

                <div class="bg-gray-50 rounded-xl p-6 border border-gray-200">
                    <h5 class="flex items-center gap-2 font-bold text-gray-700 mb-4 uppercase tracking-wide text-xs">
                        <i data-lucide="target" class="w-4 h-4"></i> Propósito de la Siembra
                    </h5>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <input class="peer sr-only" type="radio" name="proposito" id="propVenta" value="Venta Plantula" checked>
                            <label class="flex flex-col p-5 bg-white border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-all h-full" for="propVenta">
                                <div class="flex items-center gap-3 mb-2">
                                    <div class="p-2 bg-green-100 text-green-600 rounded-full">
                                        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                                    </div>
                                    <span class="font-bold text-lg">Comercializar Planta</span>
                                </div>
                                <p class="text-sm text-gray-500 ml-1">Para vivero, bolsas o semillero. El objetivo es vender la planta viva.</p>
                            </label>
                        </div>

                        <div class="relative">
                            <input class="peer sr-only" type="radio" name="proposito" id="propProd" value="Produccion Fruto">
                            <label class="flex flex-col p-5 bg-white border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-all h-full" for="propProd">
                                <div class="flex items-center gap-3 mb-2">
                                    <div class="p-2 bg-amber-100 text-amber-600 rounded-full">
                                        <i data-lucide="trees" class="w-6 h-6"></i>
                                    </div>
                                    <span class="font-bold text-lg text-gray-800">Cultivo Permanente</span>
                                </div>
                                <p class="text-sm text-gray-500 ml-1">Siembra en tierra firme. El objetivo es cosechar frutos a largo plazo.</p>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="bg-green-50 rounded-xl p-6 border border-green-100">
                    <h5 class="flex items-center gap-2 font-bold text-green-800 mb-4 uppercase tracking-wide text-xs">
                        <i data-lucide="leaf" class="w-4 h-4"></i> Datos del Cultivo
                    </h5>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Especie / Variedad</label>
                            <div class="relative">
                                <select name="especie_id" required class="w-full appearance-none rounded-lg border border-gray-300 bg-white px-4 py-3 pr-8 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none shadow-sm transition-all">
                                    <option value="">Selecciona una especie...</option>
                                    {% for especie in especies %}
                                    <option value="{{ especie.id }}">{{ especie.nombre_comun }} ({{ especie.nombre_cientifico }})</option>
                                    {% endfor %}
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">¿No aparece? <a href="{{ url_for('main.nueva_especie') }}" class="text-green-600 hover:underline font-bold">Registrar nueva especie</a></p>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Cantidad a Sembrar</label>
                            <input type="number" name="cantidad" required min="1"
                                   class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none shadow-sm transition-all"
                                   placeholder="Ej: 500">
                            <p class="text-xs text-gray-500 mt-1">Número de plantas, plántulas o semillas.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl p-6 border border-blue-100">
                    <h5 class="flex items-center gap-2 font-bold text-blue-800 mb-4 uppercase tracking-wide text-xs">
                        <i data-lucide="map-pin" class="w-4 h-4"></i> Ubicación y Fecha
                    </h5>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Sede / Finca</label>
                            <div class="relative">
                                <select name="sede_id" required class="w-full appearance-none rounded-lg border border-gray-300 bg-white px-4 py-3 pr-8 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition-all">
                                    <option value="">Seleccionar Sede...</option>
                                    {% for sede in sedes %}
                                    <option value="{{ sede.id }}">{{ sede.nombre }} - {{ sede.tipo }}</option>
                                    {% endfor %}
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Sector / Bloque</label>
                            <input type="text" name="ubicacion" required
                                   class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition-all"
                                   placeholder="Ej: Sector Norte, Lote 4B">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Fecha de Siembra</label>
                            <input type="date" name="fecha_siembra" required value="{{ today_str }}"
                                   class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition-all">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3 pt-2">
                    <button type="submit" class="w-full flex justify-center items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-full shadow-lg transition-transform transform hover:-translate-y-0.5 outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <i data-lucide="sprout" class="w-6 h-6"></i> Registrar Siembra
                    </button>
                    <a href="{{ url_for('main.lista_lotes') }}" class="text-center text-sm text-gray-500 hover:text-gray-700 font-medium py-2">
                        Cancelar y Volver
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
