{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white p-4 border-0">
                <h4 class="fw-bold mb-1"><i class="bi bi-person-plus me-2"></i> Registrar Cliente</h4>
                <p class="mb-0 opacity-75 small">Agrega un nuevo cliente a tu directorio.</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase text-muted">Nombre / Razón Social <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control form-control-lg bg-light border-0" placeholder="Ej: Agropecuaria La Finca" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-bold small text-uppercase text-muted">Documento (CC/NIT)</label>
                            <input type="text" name="documento" class="form-control bg-light border-0" placeholder="Ej: 900.123.456">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold small text-uppercase text-muted">Teléfono</label>
                            <input type="text" name="telefono" class="form-control bg-light border-0" placeholder="Ej: 300 123 4567">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase text-muted">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control bg-light border-0" placeholder="cliente@email.com">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Dirección</label>
                        <input type="text" name="direccion" class="form-control bg-light border-0" placeholder="Ej: Vereda El Hato, Finca 3">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
                        <a href="{{ url_for('main.lista_clientes') }}" class="btn btn-light text-muted rounded-pill px-4">Cancelar</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 shadow-sm fw-bold">
                            Guardar Cliente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
