{% extends "base.html" %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 text-center">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold text-success">Bienvenido a EcoSistem</h1>
        <p class="col-md-8 fs-4 mx-auto">Sistema Integral de Gestión para Viveros.</p>
        
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('main.login') }}" class="btn btn-primary btn-lg mt-3">Ingresar al Sistema</a>
        {% else %}
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-success btn-lg mt-3">Ir al Panel de Control</a>
        {% endif %}
    </div>
</div>
{% endblock %}
