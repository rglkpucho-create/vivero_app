{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-success">Crear Nueva Cuenta</h3>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre Completo *</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Electrónico *</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="tel" name="telefono" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Rol</label>
                            <select name="rol" class="form-select">
                                {% for r in roles %}
                                    <option value="{{ r.nombre }}">{{ r.nombre }}</option>
                                {% else %}
                                    <option value="Administrador">Administrador</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña *</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Registrarse</button>
                        <a href="{{ url_for('main.login') }}" class="btn btn-outline-secondary">Volver al Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
